import pytest
from fastapi.testclient import TestClient
from src.app import app
from src.metrics.prometheus_metrics import setup_metrics

client = TestClient(app)

def test_metrics_endpoint_returns_200():
    response = client.get("/metrics")
    assert response.status_code == 200

def test_metrics_format_is_valid():
    response = client.get("/metrics")
    assert b'# HELP' in response.content
    assert b'# TYPE' in response.content

def test_required_metrics_are_present():
    response = client.get("/metrics")
    required_metrics = [
        'agent_tool_call_latency_seconds',
        'agent_memory_usage_bytes',
        'agent_error_rate'
    ]
    for metric in required_metrics:
        assert metric.encode() in response.content

def test_metrics_update_over_time(mocker):
    # Mock time to return fixed values
    mock_time = mocker.patch('time.time', side_effect=[1000, 2000])
    setup_metrics()

    # First request
    response1 = client.get("/metrics")
    timestamp1 = float(response1.text.split('\n')[0].split(' ')[-1])

    # Second request
    response2 = client.get("/metrics")
    timestamp2 = float(response2.text.split('\n')[0].split(' ')[-1])

    assert timestamp1 != timestamp2
    assert timestamp2 > timestamp1