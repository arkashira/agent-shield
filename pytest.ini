from pydantic import BaseModel, Field, validator
from typing import Optional

class ToolInput(BaseModel):
    tool_name: str = Field(..., min_length=1, max_length=50)
    arguments: dict
    
    @validator('tool_name')
    def validate_tool_name(cls, v):
        allowed_tools = ["search", "calculate", "query_db"]
        if v not in allowed_tools:
            raise ValueError(f"Tool '{v}' not authorized")
        return v

    @validator('arguments')
    def sanitize_arguments(cls, v):
        # Prevent basic injection patterns in string values
        for key, value in v.items():
            if isinstance(value, str):
                if any(char in value for char in [";", "--", "/*"]):
                    raise ValueError("Potential injection detected in arguments")
        return v