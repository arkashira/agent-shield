def test_log_format():
    log_entry = create_log_entry(agent_id="123", tool_name="example_tool", input="some_input", output="some_output", status="success")
    assert isinstance(log_entry, dict)
    assert "agent_id" in log_entry
    assert "tool_name" in log_entry
    assert "input" in log_entry
    assert "output" in log_entry
    assert "timestamp" in log_entry
    assert "status" in log_entry
    assert log_entry["input"] == truncate("some_input", 1024)
    assert log_entry["output"] == truncate("some_output", 1024)

def test_redaction_of_sensitive_fields():
    log_entry = create_log_entry(agent_id="123", tool_name="example_tool", input="API_KEY=secret123", output="result", status="success")
    assert "API_KEY" not in log_entry["input"]